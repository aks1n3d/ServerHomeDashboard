version: '3.8'

# Docker Compose example with common homelab services
# This shows how to set up a complete homelab stack with the dashboard

services:
  # Homelab Dashboard
  dashboard:
    build:
      context: ./homelab-dashboard
      dockerfile: Dockerfile
    container_name: homelab-dashboard
    ports:
      - "3395:3000"
    volumes:
      - ./homelab-dashboard/config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    networks:
      - homelab
    depends_on:
      - portainer
      - nextcloud


  # Portainer - Docker Management
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    ports:
      - "9000:9000"
      - "8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer-data:/data
    restart: unless-stopped
    networks:
      - homelab

  # Nextcloud - File Sync
  nextcloud:
    image: nextcloud:latest
    container_name: nextcloud
    ports:
      - "8080:80"
    volumes:
      - nextcloud-data:/var/www/html
    environment:
      - NEXTCLOUD_ADMIN_USER=admin
      - NEXTCLOUD_ADMIN_PASSWORD=admin123
    restart: unless-stopped
    networks:
      - homelab
    depends_on:
      - postgres

  # PostgreSQL - Database for Nextcloud
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      - POSTGRES_DB=nextcloud
      - POSTGRES_USER=nextcloud
      - POSTGRES_PASSWORD=nextcloud123
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - homelab

  # Pi-hole - DNS/Ad Blocking
  pihole:
    image: pihole/pihole:latest
    container_name: pihole
    ports:
      - "53:53/tcp"
      - "53:53/udp"
      - "8081:80"
    environment:
      - TZ=UTC
      - WEBPASSWORD=admin123
    volumes:
      - pihole-data:/etc/dnsmasq.d
      - pihole-logs:/var/log/dnsmasq.log
    restart: unless-stopped
    networks:
      - homelab

  # Uptime Kuma - Monitoring
  uptime-kuma:
    image: louislam/uptime-kuma:latest
    container_name: uptime-kuma
    ports:
      - "3001:3001"
    volumes:
      - uptime-kuma-data:/app/data
    restart: unless-stopped
    networks:
      - homelab

  # Home Assistant - Smart Home
  home-assistant:
    image: homeassistant/home-assistant:latest
    container_name: home-assistant
    ports:
      - "8123:8123"
    volumes:
      - home-assistant-data:/config
    environment:
      - TZ=UTC
    restart: unless-stopped
    networks:
      - homelab

volumes:
  portainer-data:
  nextcloud-data:
  postgres-data:
  pihole-data:
  pihole-logs:
  uptime-kuma-data:
  home-assistant-data:

networks:
  homelab:
    driver: bridge

